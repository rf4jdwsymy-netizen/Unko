<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Lua Obfuscator</title>
<style>
body{background:#000;color:#0ff;font-family:monospace;padding:20px;}
textarea{width:100%;height:200px;background:#000;color:#0ff;border:1px solid #0ff;margin-top:10px;}
button{width:100%;padding:10px;margin-top:10px;background:#0ff;border:none;}
</style>
</head>
<body>

<h1>Lua Obfuscator (Stable)</h1>

<textarea id="input" placeholder="Luaコード"></textarea>
<button onclick="obf()">OBFUSCATE</button>
<textarea id="output"></textarea>

<script>
function rand(len){
    const c="abcdefghijklmnopqrstuvwxyz";
    let r="";
    for(let i=0;i<len;i++) r+=c[Math.floor(Math.random()*c.length)];
    return r;
}

// XOR（安全版）
function xor(str,key){
    let out=[];
    for(let i=0;i<str.length;i++){
        out.push(str.charCodeAt(i)^key);
    }
    return out.join(",");
}

function obf(){
    let code=document.getElementById("input").value;
    let key=Math.floor(Math.random()*200)+20;

    let encoded=xor(code,key);

    let varName=rand(8);

    let lua = `
local ${varName} = {${encoded}}
local k = ${key}

local function d(t,k)
    local s = ""
    for i=1,#t do
        s = s .. string.char(bit32.bxor(t[i],k))
    end
    return s
end

local f = loadstring(d(${varName},k))
if f then
    f()
end
`;

    document.getElementById("output").value = lua;
}
</script>

</body>
</html>
